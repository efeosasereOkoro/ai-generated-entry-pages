}
.pc-edit-guideline {
  flex: 1; border: none; border-bottom: 1px dashed var(--color-teal-100);
  outline: none; background: transparent; font-size: var(--font-size-body);
  padding: 2px 0; line-height: 1.5;
}

/* Add new guideline input row */
.pc-add-guideline {
  display: flex; align-items: center; gap: var(--spacing-xs);
  margin-top: var(--spacing-xs); padding-top: var(--spacing-xs);
  border-top: 1px dashed var(--color-grey-30);
}
.pc-add-guideline input {
  flex: 1; border: 1px solid var(--color-grey-30); border-radius: var(--radius-sm);
  padding: 6px 10px; font-size: var(--font-size-body);
  outline: none;
}
.pc-add-guideline input:focus { box-shadow: 0 0 0 3px var(--color-teal-40); }

/* Section toolbar */
.pc-toolbar {
  display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap; gap: var(--spacing-s);
  padding: var(--spacing-s) 0 var(--spacing-xm);
  border-bottom: 2px solid var(--color-blue-10);
  margin-bottom: var(--spacing-m);
}
.pc-toolbar-left { display: flex; gap: var(--spacing-xs); flex-wrap: wrap; align-items: center; }

/* Upload zone */
.pc-upload-zone {
  border: 2px dashed var(--color-blue-40);
  background: var(--color-blue-10);
  border-radius: var(--radius-sm);
  padding: var(--spacing-m);
  text-align: center;
  transition: background 0.15s, border-color 0.15s;
  cursor: pointer;
  position: relative;
}
.pc-upload-zone:hover, .pc-upload-zone.dragover {
  background: #d4dcf0;
  border-color: var(--color-blue-100);
}
.pc-upload-zone input[type="file"] {
  position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
}
.pc-upload-zone__icon { font-size: 2rem; margin-bottom: var(--spacing-xs); }
.pc-upload-zone__title { font-weight: 700; font-size: var(--font-size-body); margin-bottom: 4px; }
.pc-upload-zone__hint { font-size: var(--font-size-caption); color: var(--color-text-muted); }

/* AI processing banner */
.pc-ai-banner {
  display: flex; align-items: center; gap: var(--spacing-s);
  background: var(--color-teal-10); border: 1px solid var(--color-teal-40);
  border-left: 4px solid var(--color-teal-00);
  padding: var(--spacing-s) var(--spacing-xm);
  margin-bottom: var(--spacing-m);
}
.pc-ai-banner__spinner {
  width: 20px; height: 20px; border: 3px solid var(--color-teal-40);
  border-top-color: var(--color-teal-00); border-radius: 50%;
  animation: spin 0.8s linear infinite; flex-shrink: 0;
}
@keyframes spin { to { transform: rotate(360deg); } }
.pc-ai-banner__text { font-size: var(--font-size-body); color: var(--color-teal-00); font-weight: 600; }
.pc-ai-banner__sub { font-size: var(--font-size-caption); color: var(--color-mid-grey-00); font-weight: 400; }

/* Modal overlay */
.pc-modal-backdrop {
  position: fixed; inset: 0; background: rgba(0,0,0,0.5);
  z-index: 100; display: flex; align-items: center; justify-content: center;
  padding: var(--spacing-s);
}
.pc-modal {
  background: #fff; width: 100%; max-width: 560px;
  border-top: 6px solid var(--color-blue-100);
  padding: var(--spacing-m); max-height: 90vh; overflow-y: auto;
}
.pc-modal__title { font-size: var(--font-size-h2); font-weight: 700; margin-bottom: var(--spacing-s); }
.pc-modal__actions { display: flex; gap: var(--spacing-s); margin-top: var(--spacing-m); flex-wrap: wrap; }

/* Last updated badge */
.pc-meta {
  font-size: var(--font-size-caption); color: var(--color-mid-grey-00);
  display: flex; align-items: center; gap: var(--spacing-xs); flex-wrap: wrap;
}
.pc-meta__badge {
  display: inline-flex; align-items: center; gap: 4px;
  background: var(--color-grey-00); padding: 2px 8px;
  border-radius: 12px; font-size: 0.75rem;
}

/* Empty state */
.pc-empty {
  text-align: center; padding: var(--spacing-xl) var(--spacing-m);
  color: var(--color-mid-grey-00); border: 2px dashed var(--color-grey-00);
}
.pc-empty__icon { font-size: 3rem; margin-bottom: var(--spacing-s); }

/* Collapse toggle */
.pc-collapse-btn {
  background: none; border: none; cursor: pointer;
  color: var(--color-mid-grey-00); font-size: 0.75rem; padding: 4px;
  display: flex; align-items: center; gap: 4px;
}
.pc-collapse-btn:hover { color: var(--color-blue-100); }
.pc-collapse-icon { transition: transform 0.2s; display: inline-block; }
.pc-collapse-icon.open { transform: rotate(90deg); }
</style>

// =========================================================================
// HELPERS
// =========================================================================
function fmtDate(s) { if (!s) return '—'; return new Date(s).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' }); }
function fmtDateTime(s) { if (!s) return '—'; const d = new Date(s); return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' }) + ' ' + d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' }); }
function daysUntil(s) { if (!s) return null; return Math.ceil((new Date(s) - TODAY) / 86400000); }
function escapeHtml(s) { if (s == null) return ''; return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }
function getMda(code) { return state.mdas.find(m => m.code === code); }
function uid() { return 's' + Math.random().toString(36).slice(2, 9); }
function slugify(s) { return (s||'').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g,''); }
function slaClass(due) { const d = daysUntil(due); if (d == null) return ''; if (d < 0) return 'sla-overdue'; if (d <= 1) return 'sla-warn'; return 'sla-ok'; }
function puid() { return 'p' + Math.random().toString(36).slice(2, 9); }

// =========================================================================
// PIPELINE LOGIC
// =========================================================================
function runTriage(s) {
  const reasons = [];
  if (!s.formUrl || !/^https?:\/\/.+\..+/i.test(s.formUrl)) reasons.push('Form URL must be a valid URL (https://…)');
  if (!s.mdaCode || !getMda(s.mdaCode)) reasons.push('MDA must be selected from the registered list');
  for (const [k, label] of [['serviceName','Service name'],['whatService','What is this service for?'],['whoFor','Who is this service for?'],['serviceMode','Service mode'],['whatToHave','What to have ready'],['whatHappensAfter','What happens after submit']]) {
    const v = (s[k]||'').trim(); if (!v || v.length < 3) reasons.push('Field "'+label+'" is empty or too short');
  }
  if (s.serviceMode === 'Unknown') reasons.push('Service mode must be Online, In person, or Partly online');
  const blob = ((s.serviceName||'') + ' ' + (s.whatService||'') + ' ' + (s.whatItMeans||'')).toLowerCase();
  for (const p of ['marshmellow','marshmallow','great again','lorem ipsum','test test','asdf','demo']) if (blob.includes(p)) reasons.push('Service description contains noise pattern: "'+p+'"');
  if ((s.whatService||'').length < 30) reasons.push('"What is this service for?" should be at least 30 characters');
  return { passed: reasons.length === 0, reasons };
}

function scoreRisk(s) {
  let score = 0; const reasons = [];
  const blob = (Object.values(s).join(' ')||'').toLowerCase();
  if (/(?<!no\s)(bank|account|payment|deposit|fee|cost)/.test(blob)) { score += 1; reasons.push('Involves money or bank details'); }
  if (/eligib|means-test|pensioner|age|income/.test(blob)) { score += 2; reasons.push('Has eligibility or means-testing rules'); }
  if (/deadline|by .* (each|year)|cut[- ]off|late.*(fee|penalty)/.test(blob)) { score += 2; reasons.push('Hard deadline with consequence'); }
  if (s.alphaPaths && /yes|paths/i.test(s.alphaPaths)) { score += 1; reasons.push('Multiple paths through the service'); }
  if (s.commonConfusion && s.commonConfusion.length > 20) { score += 1; reasons.push('Has documented common-confusion areas'); }
  if (s.specialCases && s.specialCases.toLowerCase() !== 'none' && s.specialCases.length > 5) { score += 1; reasons.push('Has special cases or exceptions'); }
  let level = 'low'; if (score >= 4) level = 'high'; else if (score >= 2) level = 'medium';
  return { level, reasons };
}

function decidePageModel(s) {
  const hasGuidance = (s.commonConfusion && s.commonConfusion.length > 5 && s.commonConfusion.toLowerCase() !== 'none')
    || (s.specialCases && s.specialCases.length > 5 && s.specialCases.toLowerCase() !== 'none')
    || (s.unusual && s.unusual.length > 5 && !['none','nothing'].includes((s.unusual||'').toLowerCase()));
  const isComplex = (s.alphaShape && /paths/i.test(s.alphaShape)) || (s.alphaDropOff && s.alphaDropOff.toLowerCase() !== 'none');
  if (isComplex && hasGuidance) return 'separate-with-guidance';
  if (isComplex) return 'separate-no-guidance';
  if (hasGuidance) return 'combined-with-guidance';
  return 'combined-no-guidance';
}

function generateDrafts(s) {
  const model = decidePageModel(s);
  const drafts = {};
  if (model.startsWith('separate')) {
    drafts.entry = { title: s.serviceName, summary: s.whatService, whoFor: s.whoFor, cta: { label: 'Start now', target: '#start' } };
  }
  drafts.start = {
    title: s.serviceName,
    isCombined: model.startsWith('combined'),
    summary: model.startsWith('combined') ? s.whatService : null,
    whoFor: model.startsWith('combined') ? s.whoFor : null,
    beforeYouStart: [
      'This service is ' + (s.serviceMode||'').toLowerCase() + '.',
      s.costsDeadlines && !/^no( fees)?$/i.test(s.costsDeadlines) ? s.costsDeadlines : null,
      s.beforeStart || null
    ].filter(Boolean),
    whatYouNeed: (s.whatToHave||'').split(/[,;]/).map(x => x.trim()).filter(Boolean),
    whatHappensAfter: s.whatHappensAfter, whatItMeans: s.whatItMeans,
    cta: { label: 'Apply now', target: s.formUrl }
  };
  if (model.endsWith('with-guidance')) {
    drafts.guidance = {
      title: s.serviceName + ' — guidance',
      sections: [
        s.commonConfusion && s.commonConfusion.toLowerCase() !== 'none' ? { heading: 'What people often get wrong', body: s.commonConfusion } : null,
        s.specialCases && s.specialCases.toLowerCase() !== 'none' ? { heading: 'Special cases and exceptions', body: s.specialCases } : null,
        s.unusual && !['none','nothing'].includes((s.unusual||'').toLowerCase()) ? { heading: 'Easy to miss', body: s.unusual } : null
      ].filter(Boolean)
    };
  }
  return { model, drafts };
}

function runChecklist(s) {
  const { drafts } = generateDrafts(s);
  const checks = [
    { label: 'Timing rules near the top, standalone', auto: true, pass: (drafts.start.beforeYouStart||[]).length > 0, detail: 'At least one timing/mode line in "Before you start"' },
    { label: 'Service mode explicit (online / in person / partly online)', auto: true, pass: ['Online','In person','Partly online'].includes(s.serviceMode), detail: 'Detected: ' + s.serviceMode },
    { label: 'Next step uses a verb users recognise', auto: true, pass: /^(apply|start|register|book|claim|request|submit|get|pay)/i.test(drafts.start.cta.label), detail: 'CTA: "' + drafts.start.cta.label + '"' },
    { label: 'No CTA duplication', auto: true, pass: !drafts.entry || (drafts.entry.cta.label.toLowerCase() !== drafts.start.cta.label.toLowerCase()), detail: 'Entry CTA vs Start CTA differ' },
    { label: '"Who is this for?" present', auto: true, pass: !!(s.whoFor && s.whoFor.length > 5), detail: '' },
    { label: 'Common confusion addressed (if present)', auto: true, pass: !s.commonConfusion || s.commonConfusion.toLowerCase() === 'none' || !!(drafts.guidance), detail: 'Guidance page required' },
    { label: 'Plain language tone check', auto: false, pass: null, detail: 'Manual review — check sentence length and active voice' },
    { label: 'Factual accuracy confirmed with MDA', auto: false, pass: null, detail: 'Manual review — MDA T2 sign-off required' },
    { label: 'Accessibility: headings logical, no skip levels', auto: false, pass: null, detail: 'Manual review' }
  ];
  return checks;
}

function renderPrincipleCard(pr, idx) {
  const isCollapsed = pr.collapsed;
  return `
    <div class="pc-card" id="pc-${escapeHtml(pr.id)}">
      <div class="pc-card__header" onclick="toggleCollapse('${pr.id}')">
        <div style="flex:1">
          <div style="display:flex;align-items:center;gap:var(--spacing-xs)">
            <span style="color:var(--color-blue-40);font-weight:700;font-size:0.875rem;min-width:1.5rem">${idx + 1}.</span>
            <span class="pc-card__title">${escapeHtml(pr.title)}</span>
          </div>
          ${pr.description && !isCollapsed ? `<p class="govbb-hint" style="margin-top:4px;padding-left:1.75rem">${escapeHtml(pr.description)}</p>` : ''}
        </div>
        <div class="pc-card__actions" onclick="event.stopPropagation()">
          <button class="govbb-btn--tertiary" style="padding:6px 12px;font-size:0.8rem" onclick="openEditPrincipleModal('${pr.id}')">Edit</button>
          <button class="govbb-btn--destructive" style="padding:6px 12px;font-size:0.8rem" onclick="deletePrinciple('${pr.id}')">Delete</button>
          <button class="pc-collapse-btn" title="${isCollapsed ? 'Expand' : 'Collapse'}">
            <span class="pc-collapse-icon ${isCollapsed ? '' : 'open'}">▶</span>
          </button>
        </div>
      </div>
      ${!isCollapsed ? `
        <div class="pc-card__body">
          ${pr.guidelines && pr.guidelines.length > 0
            ? pr.guidelines.map((g, gi) => `
                <div class="pc-guideline">
                  <span class="pc-guideline__bullet">${gi + 1}</span>
                  <span class="pc-guideline__text">${escapeHtml(g)}</span>
                </div>`).join('')
            : `<p class="govbb-hint" style="font-style:italic">No guidelines yet — click Edit to add some.</p>`
          }
        </div>` : ''}
    </div>
  `;
}

// PRINCIPLES INTERACTIONS

function toggleCollapse(id) {
  const pr = principles.principles.find(p => p.id === id);
  if (pr) { pr.collapsed = !pr.collapsed; savePrinciples(); renderPrinciplesList(); }
}

function toggleAllCollapse(collapse) {
  principles.principles.forEach(p => p.collapsed = collapse);
  savePrinciples(); renderPrinciplesList();
}

function renderPrinciplesList() {
  const list = document.getElementById('principlesList');
  if (!list) return;
  if (principles.principles.length === 0) {
    list.innerHTML = `<div class="pc-empty"><div class="pc-empty__icon">📋</div><p class="govbb-text-h3">No principles yet</p><p class="govbb-text-caption" style="margin-top:var(--spacing-xs)">Add one manually or upload a document to get started.</p></div>`;
    return;
  }
  list.innerHTML = principles.principles.map((pr, idx) => renderPrincipleCard(pr, idx)).join('');
}

function deletePrinciple(id) {
  if (!confirm('Delete this principle and all its guidelines?')) return;
  principles.principles = principles.principles.filter(p => p.id !== id);
  savePrinciples(); renderPrinciplesList();
}

function openAddPrincipleModal() {
  document.getElementById('pcEditModalTitle').textContent = 'Add principle';
  document.getElementById('pcEditId').value = '';
  document.getElementById('pcEditTitleInput').value = '';
  document.getElementById('pcEditDescInput').value = '';
  document.getElementById('pcEditGuidelinesInput').value = '';
  document.getElementById('pcEditModal').style.display = 'flex';
}

function openEditPrincipleModal(id) {
  const pr = principles.principles.find(p => p.id === id);
  if (!pr) return;
  document.getElementById('pcEditModalTitle').textContent = 'Edit principle';
  document.getElementById('pcEditId').value = pr.id;
  document.getElementById('pcEditTitleInput').value = pr.title;
  document.getElementById('pcEditDescInput').value = pr.description || '';
  document.getElementById('pcEditGuidelinesInput').value = (pr.guidelines || []).join('\n');
  document.getElementById('pcEditModal').style.display = 'flex';
}

function savePrincipleFromModal() {
  const id = document.getElementById('pcEditId').value;
  const title = document.getElementById('pcEditTitleInput').value.trim();
  const description = document.getElementById('pcEditDescInput').value.trim();
  const guidelinesRaw = document.getElementById('pcEditGuidelinesInput').value;
  const guidelines = guidelinesRaw.split('\n').map(g => g.trim()).filter(Boolean);
  if (!title) { alert('Please enter a title for the principle.'); return; }
  if (id) {
    const pr = principles.principles.find(p => p.id === id);
    if (pr) { pr.title = title; pr.description = description; pr.guidelines = guidelines; }
  } else {
    principles.principles.push({ id: puid(), title, description, guidelines, collapsed: false });
  }
  principles.lastUpdated = new Date().toISOString();
  savePrinciples();
  closePrincipleModal();
  renderPrinciplesList();
  // Re-render meta bar
  const metaEl = document.querySelector('.pc-meta');
  if (metaEl) {
    const lastUpdatedStr = `Updated ${fmtDateTime(principles.lastUpdated)}${principles.lastSource ? ' · from <em>' + escapeHtml(principles.lastSource) + '</em>' : ''}`;
    metaEl.innerHTML = `<span class="pc-meta__badge"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>${lastUpdatedStr}</span><span class="pc-meta__badge">${principles.principles.length} principle${principles.principles.length !== 1 ? 's' : ''}</span>`;
  }
}

function closePrincipleModal(evt) {
  if (evt && evt.target !== document.getElementById('pcEditModal')) return;
  document.getElementById('pcEditModal').style.display = 'none';
}

// =========================================================================
// UPLOAD + AI PROCESSING
// =========================================================================
let selectedFile = null;
let selectedFileText = null;

function openUploadModal() {
  selectedFile = null; selectedFileText = null;
  document.getElementById('pcFileChosen').style.display = 'none';
  document.getElementById('pcProcessBtn').disabled = true;
  document.getElementById('pcUploadModal').style.display = 'flex';
}

function closeUploadModal(evt) {
  if (evt && evt.target !== document.getElementById('pcUploadModal')) return;
  document.getElementById('pcUploadModal').style.display = 'none';
}

function handleFileDrop(event) {
  event.preventDefault();
  document.getElementById('pcUploadZone').classList.remove('dragover');
  const file = event.dataTransfer.files[0];
  if (file) prepareFile(file);
}

function handleFileSelect(event) {
  const file = event.target.files[0];
  if (file) prepareFile(file);
}

function prepareFile(file) {
  selectedFile = file;
  document.getElementById('pcFileChosenName').textContent = '📎 ' + file.name + ' (' + (file.size / 1024).toFixed(1) + ' KB)';
  document.getElementById('pcFileChosen').style.display = 'block';
  document.getElementById('pcProcessBtn').disabled = false;
}

async function processUpload() {
  if (!selectedFile) return;
  document.getElementById('pcUploadModal').style.display = 'none';

  const banner = document.getElementById('pcAiBanner');
  const bannerText = document.getElementById('pcAiBannerText');
  const bannerSub = document.getElementById('pcAiBannerSub');
  banner.style.display = 'flex';
  bannerText.textContent = 'Reading document…';
  bannerSub.textContent = 'Extracting text from ' + selectedFile.name;

  let documentContent = '';
  let base64Data = null;
  const isPdf = selectedFile.type === 'application/pdf' || selectedFile.name.endsWith('.pdf');
  const isDocx = selectedFile.name.endsWith('.docx') || selectedFile.type.includes('wordprocessingml');

  try {
    if (isPdf) {
      // Send as base64 PDF to Claude
      base64Data = await fileToBase64(selectedFile);
    } else {
      // Read as text for txt/md; for docx try text extraction
      documentContent = await readFileAsText(selectedFile);
    }
  } catch (e) {
    banner.style.display = 'none';
    alert('Could not read the file. Please try a .txt or .md file if the issue persists.');
    return;
  }

  bannerText.textContent = 'Analysing with Claude…';
  bannerSub.textContent = 'Extracting principles and guidelines from your document';

  const systemPrompt = `You are a content design expert helping a government digital team extract and structure content principles.

Given a document, extract the writing principles, guidelines, and standards it contains. Return ONLY a JSON object with this exact structure:
{
  "principles": [
    {
      "title": "Short, clear principle name (e.g. Write for the user)",
      "description": "One or two sentences explaining what this principle means",
      "guidelines": ["Specific rule 1", "Specific rule 2", "Specific rule 3"]
    }
  ]
}

Rules:
- Extract 3–10 principles. If the document has more, group related ones.
- Each principle should have 2–6 specific, actionable guidelines.
- Write guidelines as imperative sentences: "Use short sentences", not "Short sentences should be used".
- If the document has no clear principles, infer them from the content standards described.
- Return ONLY the JSON — no markdown, no preamble, no explanation.`;

  let messages;
  if (isPdf && base64Data) {
    messages = [{
      role: 'user',
      content: [
        { type: 'document', source: { type: 'base64', media_type: 'application/pdf', data: base64Data } },
        { type: 'text', text: 'Extract the content principles and guidelines from this document.' }
      ]
    }];
  } else {
    const truncated = documentContent.length > 12000 ? documentContent.slice(0, 12000) + '\n\n[Document truncated at 12,000 characters]' : documentContent;
    messages = [{
      role: 'user',
      content: 'Extract the content principles and guidelines from this document:\n\n' + truncated
    }];
  }

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: systemPrompt,
        messages
      })
    });

    if (!response.ok) {
      const err = await response.json().catch(() => ({}));
      throw new Error(err.error?.message || 'API error ' + response.status);
    }

    const data = await response.json();
    const raw = (data.content || []).map(b => b.text || '').join('');
    const clean = raw.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(clean);

    if (!parsed.principles || !Array.isArray(parsed.principles)) throw new Error('Unexpected response format');

    bannerText.textContent = 'Done — populating principles…';
    bannerSub.textContent = parsed.principles.length + ' principles extracted';

    // Replace principles
    principles.principles = parsed.principles.map(p => ({
      id: puid(),
      title: p.title || 'Untitled principle',
      description: p.description || '',
      guidelines: Array.isArray(p.guidelines) ? p.guidelines : [],
      collapsed: false
    }));
    principles.lastUpdated = new Date().toISOString();
    principles.lastSource = selectedFile.name;
    savePrinciples();

    setTimeout(() => {
      banner.style.display = 'none';
      // full re-render of the principles view
      nav('principles');
    }, 1200);

  } catch (e) {
    banner.style.display = 'none';
    alert('Could not generate principles: ' + e.message + '\n\nTip: Make sure the Anthropic API key is configured for this environment.');
  }
}

function fileToBase64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(',')[1]);
    r.onerror = () => rej(new Error('Read failed'));
    r.readAsDataURL(file);
  });
}

function readFileAsText(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result);
    r.onerror = () => rej(new Error('Read failed'));
    r.readAsText(file);
  });
}

    <p class="govbb-text-caption" style="margin-top:var(--spacing-xs);margin-bottom:var(--spacing-m)">${state.mdas.length} registered MDAs</p>
    <table class="proto-table">
      <thead><tr><th>Code</th><th>Name</th><th>Primary validator</th><th>Email</th><th>Backup</th></tr></thead>
      <tbody>
        ${state.mdas.map(m => `
          <tr>
            <td><strong>${escapeHtml(m.code)}</strong></td>
            <td>${escapeHtml(m.name)}</td>
            <td>${escapeHtml(m.validator||'—')}</td>
            <td>${m.email ? `<a class="govbb-link" href="mailto:${escapeHtml(m.email)}">${escapeHtml(m.email)}</a>` : '—'}</td>
            <td>${escapeHtml(m.backup||'—')}</td>
          </tr>`).join('')}
      </tbody>
    </table>
  `;
}

// =========================================================================
// SUBMIT FORM
// =========================================================================
function renderSubmit() {
  const mdaOptions = state.mdas.map(m => `<option value="${m.code}">${escapeHtml(m.code)} — ${escapeHtml(m.name)}</option>`).join('');
  return `
    <h1 class="govbb-text-h1">Submit a service</h1>
    <p class="govbb-text-caption" style="margin-top:var(--spacing-xs);margin-bottom:var(--spacing-m)">Complete the discovery form for a new service. All fields marked * are required for triage to pass.</p>
    <div id="submitError" style="display:none" class="govbb-error-summary">
      <p class="govbb-error-summary__title">There is a problem</p>
      <ul class="govbb-error-summary__list" id="submitErrorList"></ul>
    </div>
    ${formField('Service name *', 'sfServiceName', 'text', '', 'e.g. Apply for a birth certificate')}
    ${formField('Form / service URL *', 'sfFormUrl', 'url', '', 'https://forms.gov.bb/…')}
    <div class="govbb-form-group">
      <label class="govbb-label" for="sfMda">MDA *</label>
      <div class="govbb-select-wrapper">
        <select class="govbb-select" id="sfMda">
          <option value="">— Select an MDA —</option>
          ${mdaOptions}
        </select>
        <span class="govbb-select__chevron"><svg viewBox="0 0 12 8"><path d="M1 7l5-5 5 5"/></svg></span>
      </div>
    </div>
    <div class="govbb-form-group">
      <label class="govbb-label" for="sfServiceMode">Service mode *</label>
      <div class="govbb-select-wrapper">
        <select class="govbb-select" id="sfServiceMode">
          <option value="">— Select —</option>
          <option>Online</option><option>In person</option><option>Partly online</option>
        </select>
        <span class="govbb-select__chevron"><svg viewBox="0 0 12 8"><path d="M1 7l5-5 5 5"/></svg></span>
      </div>
    </div>
    ${formTextarea('What is this service for? *', 'sfWhatService', 'Describe in plain English what the service lets someone do. At least 30 characters.')}
    ${formTextarea('Who is this service for? *', 'sfWhoFor', 'Describe the intended user, including eligibility criteria if applicable.')}
    ${formTextarea('What to have ready *', 'sfWhatToHave', 'List documents, IDs, numbers the user needs before starting. Comma-separated.')}
    ${formTextarea('What happens after submitting? *', 'sfWhatHappensAfter', 'Describe the next steps and any confirmation the user receives.')}
    ${formField('Costs and deadlines', 'sfCostsDeadlines', 'text', '', 'e.g. No fee — or — $50 BBD, must apply before 30 September')}
    ${formTextarea('Common confusion or misconceptions', 'sfCommonConfusion', 'What do users often get wrong or misunderstand about this service?')}
    ${formTextarea('Special cases or exceptions', 'sfSpecialCases', 'Any groups of people with different rules or requirements?')}
    ${formTextarea('Easy to miss', 'sfUnusual', 'Anything that catches people out that plain language alone won\'t fix?')}
    ${formTextarea('Notes (optional)', 'sfNotes', 'Anything the content team should know before writing?')}
    <div class="govbb-btn-group">
      <button class="govbb-btn" onclick="submitService()">Submit for triage</button>
      <button class="govbb-btn--secondary" onclick="nav('home')">Cancel</button>
    </div>
  `;
}

function formField(label, id, type, val, placeholder) {
  return `<div class="govbb-form-group"><label class="govbb-label" for="${id}">${label}</label><div class="govbb-input-wrapper"><input id="${id}" type="${type}" value="${escapeHtml(val)}" placeholder="${escapeHtml(placeholder)}"></div></div>`;
}
function formTextarea(label, id, hint) {
  return `<div class="govbb-form-group"><label class="govbb-label" for="${id}">${label}</label>${hint?`<p class="govbb-hint">${hint}</p>`:''}<div class="govbb-input-wrapper"><textarea id="${id}" class="govbb-textarea"></textarea></div></div>`;
}

function submitService() {
  const val = id => (document.getElementById(id)?.value||'').trim();
  const s = {
    id: uid(), submittedBy: 'User', submittedAt: new Date().toISOString(),
    serviceName: val('sfServiceName'), formUrl: val('sfFormUrl'), mdaCode: val('sfMda'),
    serviceMode: val('sfServiceMode'), whatService: val('sfWhatService'),
    whoFor: val('sfWhoFor'), whatToHave: val('sfWhatToHave'),
    whatHappensAfter: val('sfWhatHappensAfter'), costsDeadlines: val('sfCostsDeadlines'),
    commonConfusion: val('sfCommonConfusion'), specialCases: val('sfSpecialCases'),
    unusual: val('sfUnusual'), notes: val('sfNotes'),
    alphaPaths: '', alphaShape: '', alphaDropOff: '', beforeStart: ''
  };
  const triage = runTriage(s);
  if (triage.passed) {
    const risk = scoreRisk(s);
    s.stage = 'generated'; s.risk = risk.level; s.riskReasons = risk.reasons;
    s.pageModel = decidePageModel(s);
    s.slaDue = new Date(Date.now() + 5*86400000).toISOString().slice(0,10);
    s.history = [
      { at: s.submittedAt, who: 'User', action: 'Submitted', note: '' },
      { at: new Date().toISOString(), who: 'System', action: 'Triage passed', note: '' },
      { at: new Date().toISOString(), who: 'AI Generator', action: 'Drafts produced', note: 'Page model: ' + s.pageModel }
    ];
  } else {
    s.stage = 'rejected-triage'; s.risk = 'n/a'; s.triageReasons = triage.reasons;
    s.history = [
      { at: s.submittedAt, who: 'User', action: 'Submitted', note: '' },
      { at: new Date().toISOString(), who: 'System', action: 'Triage failed', note: triage.reasons.length + ' issues' }
    ];
  }
  state.services.unshift(s);
  saveState();
  nav('service', s.id);
}

// =========================================================================
// MAIN RENDER
// =========================================================================
function render() {
  renderNav();
  const app = document.getElementById('app');
  if (currentView === 'home') app.innerHTML = renderHome();
  else if (currentView === 'pipeline') app.innerHTML = renderPipeline();
  else if (currentView === 'service') app.innerHTML = renderServiceDetail(currentServiceId);
  else if (currentView === 'principles') app.innerHTML = renderPrinciples();
  else if (currentView === 'mdas') app.innerHTML = renderMdas();
  else if (currentView === 'submit') app.innerHTML = renderSubmit();
  else app.innerHTML = renderHome();
}

document.getElementById('seedBtn').addEventListener('click', () => { if (confirm('Reset all demo data? This cannot be undone.')) resetState(); });
render();
</script>
</body>
</html>
