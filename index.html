<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>A05 Entry Point Pipeline — The Government of Barbados</title>
<style data-govbb-base>
  /* ---- gov.bb design tokens (inlined subset of styles.css) ---- */
  :root, :host {
    --color-yellow-100: #ffc726; --color-yellow-40: #ffe9a8; --color-yellow-00: #e8a833;
    --color-blue-100: #00267f; --color-blue-40: #99a8cc; --color-blue-10: #e5e9f2;
    --color-teal-100: #30c0c8; --color-teal-00: #0e5f64; --color-teal-40: #ace6e9; --color-teal-10: #eaf9f9;
    --color-red-100: #ff6b6b; --color-red-00: #a42c2c; --color-red-10: #fff0f0;
    --color-green-00: #00654a; --color-green-40: #a5e5ce; --color-green-10: #e9f9f3;
    --color-grey-00: #e0e4e9; --color-grey-30: #b1b4b6;
    --color-mid-grey-00: #595959; --color-black-00: #000; --color-white-00: #fff;
    --color-pink-10: #fff4fb;
    --color-text: #000; --color-text-muted: #595959; --color-background: #fff; --color-error: #a42c2c;
    --color-link: #0e5f64; --color-link-visited: #0e5f64;
    --color-link-hover: #000; --color-link-hover-bg: #eaf9f9;
    --color-link-active: #000; --color-link-active-bg: #ffc726;
    --font-family-base: "Figtree", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    --font-size-display: 3rem; --font-size-h1: 2.25rem; --font-size-h2: 1.75rem;
    --font-size-h3: 1.25rem; --font-size-h4: 1.125rem;
    --font-size-body: 1rem; --font-size-caption: .875rem; --font-size-caption-sm: .75rem;
    --line-height-display: 1.1; --line-height-h1: 1.15; --line-height-h2: 1.2;
    --line-height-h3: 1.3; --line-height-h4: 1.4;
    --line-height-body: 1.5; --line-height-caption: 1.5;
    --font-weight-normal: 400; --font-weight-bold: 700;
    --spacing-xxs: .25rem; --spacing-xs: .5rem; --spacing-s: 1rem;
    --spacing-xm: 1.5rem; --spacing-m: 2rem; --spacing-l: 4rem; --spacing-xl: 6rem;
    --radius-sm: .25rem; --border-width-form: 2px;
    --shadow-form-hover: inset 4px 4px 0 0 #0000001a;
    --opacity-disabled: .4;
  }
  *, *::before, *::after { box-sizing: border-box; }
  html { font-family: var(--font-family-base); line-height: var(--line-height-body); -webkit-font-smoothing: antialiased; }
  body { margin: 0; color: var(--color-text); background: var(--color-background); }
  h1, h2, h3, h4, h5, h6, p, ul, ol { margin: 0; }
  ul, ol { padding: 0; list-style: none; }
  a { color: inherit; text-decoration: inherit; }
  img, svg { display: block; max-width: 100%; }
  button, input, select, textarea { font: inherit; color: inherit; }

  .govbb-page { display: grid; grid-template-rows: auto 1fr auto; min-height: 100vh; }
  .govbb-container { width: 100%; padding-inline: var(--spacing-s); margin-inline: auto; }
  @media (min-width: 1024px) { .govbb-container { width: 80%; max-width: 80rem; padding-inline: 0; } }

  .govbb-text-display { font-size: var(--font-size-display); line-height: var(--line-height-display); font-weight: 700; margin-bottom: var(--spacing-s); }
  .govbb-text-h1 { font-size: var(--font-size-h1); line-height: var(--line-height-h1); font-weight: 700; }
  .govbb-text-h2 { font-size: var(--font-size-h2); line-height: var(--line-height-h2); font-weight: 700; margin-top: var(--spacing-m); margin-bottom: var(--spacing-s); }
  .govbb-text-h3 { font-size: var(--font-size-h3); line-height: var(--line-height-h3); font-weight: 700; }
  .govbb-text-h4 { font-size: var(--font-size-h4); line-height: var(--line-height-h4); font-weight: 700; }
  .govbb-text-body { font-size: var(--font-size-body); line-height: var(--line-height-body); }
  .govbb-text-caption { font-size: var(--font-size-caption); line-height: var(--line-height-caption); color: var(--color-text-muted); }

  .govbb-link { color: var(--color-link); text-decoration: underline; text-underline-offset: 2px; cursor: pointer; }
  .govbb-link:hover { color: var(--color-link-hover); background: var(--color-link-hover-bg); text-decoration: none; }
  .govbb-link:focus-visible, .govbb-link:active { color: var(--color-link-active); background: var(--color-link-active-bg); outline: 0; text-decoration: none; }
  .govbb-link--secondary { color: var(--color-link); text-decoration: underline; }

  .govbb-list { padding: 0; margin: 0; }
  .govbb-list--bullet { padding-inline-start: var(--spacing-m); list-style: disc; }
  .govbb-list > li { margin-bottom: var(--spacing-xxs); }

  .govbb-breadcrumbs { display: flex; align-items: center; font-size: var(--font-size-body); margin-block: var(--spacing-s); }
  .govbb-breadcrumbs__list { display: flex; flex-wrap: wrap; align-items: center; gap: 0; row-gap: 4px; }
  .govbb-breadcrumbs__item { display: flex; align-items: center; }
  .govbb-breadcrumbs__item + .govbb-breadcrumbs__item::before { content: ""; display: inline-block; width: .4375em; height: .4375em; margin: 0 .5em; border-top: 1px solid var(--color-mid-grey-00); border-right: 1px solid var(--color-mid-grey-00); transform: rotate(45deg); flex-shrink: 0; }
  .govbb-breadcrumbs__link { color: var(--color-link); text-decoration: underline; text-underline-offset: 2px; }
  .govbb-breadcrumbs__link:hover { background: var(--color-link-hover-bg); color: var(--color-link-hover); text-decoration: none; }

  .govbb-btn, .govbb-btn--secondary, .govbb-btn--tertiary, .govbb-btn--destructive {
    display: inline-flex; align-items: center; justify-content: center; gap: .5rem;
    padding: var(--spacing-s) var(--spacing-xm); border: 0; cursor: pointer;
    font-family: inherit; font-size: var(--font-size-body); line-height: 1.4;
    border-radius: var(--radius-sm); outline: 4px solid transparent; outline-offset: 2px;
    transition: background-color .15s, box-shadow .15s, outline-color .15s; text-decoration: none;
  }
  .govbb-btn { background: var(--color-teal-00); color: var(--color-white-00); }
  .govbb-btn:hover { background: #1a777d; box-shadow: inset 0 0 0 4px rgba(255,255,255,.1); }
  .govbb-btn:focus-visible, .govbb-btn:active { outline-color: var(--color-teal-100); }
  .govbb-btn--secondary { background: var(--color-grey-00); color: var(--color-black-00); }
  .govbb-btn--secondary:hover { box-shadow: inset 0 0 0 4px rgba(0,0,0,.05); }
  .govbb-btn--secondary:focus-visible { outline-color: var(--color-teal-100); }
  .govbb-btn--tertiary { background: transparent; color: var(--color-green-00); box-shadow: inset 0 0 0 1px var(--color-green-00); }
  .govbb-btn--tertiary:hover { background: var(--color-green-10); }
  .govbb-btn-group { display: flex; gap: var(--spacing-xm); flex-wrap: wrap; margin-top: var(--spacing-m); }

  .govbb-form-group { display: flex; flex-direction: column; gap: var(--spacing-xs); width: 100%; margin-bottom: var(--spacing-s); }
  .govbb-label { font-weight: 700; font-size: var(--font-size-body); }
  .govbb-hint { color: var(--color-text-muted); font-size: var(--font-size-body); }
  .govbb-error-message { color: var(--color-error); font-weight: 700; }

  .govbb-input-wrapper, .govbb-select-wrapper {
    display: inline-flex; align-items: stretch; width: 100%; background: var(--color-background);
    border: var(--border-width-form) solid var(--color-text); border-radius: var(--radius-sm);
    transition: box-shadow .15s; position: relative;
  }
  .govbb-input-wrapper:hover, .govbb-select-wrapper:hover { box-shadow: var(--shadow-form-hover); }
  .govbb-input-wrapper:focus-within, .govbb-select-wrapper:focus-within { box-shadow: 0 0 0 4px var(--color-teal-100); }
  .govbb-input-wrapper > input, .govbb-input-wrapper > textarea {
    width: 100%; padding: var(--spacing-s); font: inherit; color: inherit;
    background: transparent; border: 0; outline: 0;
  }
  .govbb-textarea { resize: vertical; min-height: 6rem; }
  .govbb-select-wrapper { display: grid; grid-template-columns: 1fr 3rem; }
  .govbb-select { appearance: none; padding: var(--spacing-s); padding-right: 3rem; background: transparent; border: 0; outline: 0; grid-area: 1/1/auto/-1; font: inherit; color: inherit; }
  .govbb-select__chevron { grid-area: 1/2; display: flex; align-items: center; justify-content: center; border-left: var(--border-width-form) solid var(--color-text); background: #f0f2f4; pointer-events: none; }
  .govbb-select__chevron > svg { width: .75rem; height: .5rem; fill: currentColor; transform: rotate(180deg); }

  .govbb-error-summary {
    border: 4px solid var(--color-red-00);
    padding: var(--spacing-xm) var(--spacing-m);
    margin-bottom: var(--spacing-m);
  }
  .govbb-error-summary__title { font-size: var(--font-size-body); font-weight: 700; }
  .govbb-error-summary__list { display: flex; flex-direction: column; align-items: flex-start; margin-top: var(--spacing-xs); }
  .govbb-error-summary__link { color: var(--color-red-00); text-decoration: underline; }

  .govbb-status-banner { width: 100%; padding-block: var(--spacing-s); }
  .govbb-status-banner > p { margin: 0; }
  .govbb-status-banner--alpha { background: var(--color-blue-10); }
  .govbb-status-banner--beta { background: var(--color-yellow-40); }

  .govbb-official-banner { background: var(--color-blue-100); color: var(--color-white-00); width: 100%; }
  .govbb-official-banner__inner { display: flex; align-items: center; gap: var(--spacing-xs); padding-block: var(--spacing-xs); font-size: var(--font-size-caption); }
  .govbb-official-banner__crest { display: flex; align-items: center; flex-shrink: 0; }
  .govbb-official-banner__icon { height: 24px; width: auto; flex-shrink: 0; }
  .govbb-official-banner__text { display: flex; flex-wrap: wrap; align-items: center; gap: var(--spacing-s); }

  .govbb-header { background: var(--color-yellow-100); color: var(--color-text); width: 100%; }
  .govbb-header__inner { display: flex; align-items: center; gap: var(--spacing-s); padding-block: var(--spacing-s); }
  .govbb-header__logo { height: 1.6875rem; width: auto; }
  @media (min-width: 1024px) { .govbb-header__inner { padding-block: var(--spacing-xm); } .govbb-header__logo { height: 2.1875rem; } }

  .govbb-footer { background: var(--color-blue-100); color: var(--color-white-00); width: 100%; overflow: hidden; }
  .govbb-footer__inner { display: grid; grid-template-columns: 1fr; }
  @media (min-width: 1024px) { .govbb-footer__inner { grid-template-columns: 1fr 1fr; } }
  .govbb-footer__nav { display: flex; flex-direction: column; gap: var(--spacing-xs); padding-block: var(--spacing-m); }
  .govbb-footer__link { color: inherit; text-decoration: underline; }
  .govbb-footer__divider { border: 0; border-top: 4px solid rgba(0,0,0,.25); margin-inline: calc(var(--spacing-s) * -1); }
  .govbb-footer__end { display: flex; flex-direction: column; gap: var(--spacing-xm); padding-block: var(--spacing-m) var(--spacing-s); }
  .govbb-footer__coat { height: 7rem; width: auto; }
  .govbb-footer__copy { color: var(--color-white-00); margin: 0; }
  @media (min-width: 1024px) { .govbb-footer__end { align-items: flex-end; padding-block: var(--spacing-m); } .govbb-footer__divider { display: none; } }

  .govbb-feedback-box { padding: var(--spacing-s); background: var(--color-yellow-40); border: 4px solid var(--color-yellow-100); margin-top: var(--spacing-m); }

  .govbb-page__main { padding-block: var(--spacing-m); }
</style>
<style>
  /* ---- Prototype-only layout (uses GOVBB design tokens) ---- */
  .proto-shell {
    display: grid;
    grid-template-columns: 1fr;
    gap: var(--spacing-m);
    padding-block: var(--spacing-m);
  }
  @media (width >= 1024px) {
    .proto-shell { grid-template-columns: 240px 1fr; gap: var(--spacing-xl); }
  }
  .proto-side { display: flex; flex-direction: column; gap: var(--spacing-xs); }
  .proto-side__heading {
    font-size: 0.75rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;
    color: var(--color-mid-grey-00); margin: var(--spacing-s) 0 var(--spacing-xs); padding-inline: var(--spacing-xs);
  }
  .proto-nav-link {
    display: flex; align-items: center; gap: var(--spacing-xs);
    padding: var(--spacing-xs) var(--spacing-s); text-decoration: none;
    color: var(--color-blue-100); border-left: 4px solid transparent;
    font-weight: 600; cursor: pointer;
  }
  .proto-nav-link:hover { background: var(--color-grey-10, #f3f2f1); }
  .proto-nav-link[aria-current="page"] {
    background: var(--color-blue-10);
    border-left-color: var(--color-blue-100);
    color: var(--color-blue-100);
  }
  .proto-nav-link .count {
    margin-left: auto;
    background: var(--color-blue-100); color: #fff;
    border-radius: 12px; font-size: 0.75rem;
    padding: 0 8px; min-width: 22px; text-align: center; line-height: 1.4;
  }
  .proto-main { display: flex; flex-direction: column; gap: var(--spacing-m); min-width: 0; }

  .proto-tile {
    display: block; padding: var(--spacing-s);
    border: 2px solid var(--color-blue-100); background: #fff;
    text-decoration: none; color: var(--color-blue-100); cursor: pointer;
  }
  .proto-tile:hover { background: var(--color-blue-10); }
  .proto-tile h3 { margin: 0 0 4px; }

  .proto-grid-2 { display: grid; grid-template-columns: 1fr; gap: var(--spacing-s); }
  @media (width >= 768px) { .proto-grid-2 { grid-template-columns: 1fr 1fr; } }
  .proto-grid-3 { display: grid; grid-template-columns: 1fr; gap: var(--spacing-s); }
  @media (width >= 768px) { .proto-grid-3 { grid-template-columns: repeat(3, 1fr); } }
  .proto-grid-4 { display: grid; grid-template-columns: repeat(2, 1fr); gap: var(--spacing-xs); }
  @media (width >= 768px) { .proto-grid-4 { grid-template-columns: repeat(4, 1fr); } }

  .proto-stat {
    border: 1px solid var(--color-grey-30, #b1b4b6);
    padding: var(--spacing-s); background: #fff;
  }
  .proto-stat__num { font-size: 2rem; font-weight: 700; line-height: 1; }
  .proto-stat__label { font-size: 0.875rem; color: var(--color-mid-grey-00); margin-top: 4px; }

  .proto-card {
    border: 1px solid var(--color-grey-30, #b1b4b6); background: #fff;
    padding: var(--spacing-s); display: flex; gap: var(--spacing-s); align-items: center;
  }

  .proto-pill {
    display: inline-block; padding: 2px 10px; border-radius: 12px;
    font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em;
    line-height: 1.6;
  }
  .pill-stage-intake          { background: #eeefef; color: #383f43; }
  .pill-stage-rejected-triage { background: #f6d7d2; color: #942514; }
  .pill-stage-shaping         { background: #dbd5e9; color: #2d1a59; }
  .pill-stage-generated       { background: var(--color-yellow-40, #fff7bf); color: #594d00; }
  .pill-stage-validating-t1   { background: #fcd6b8; color: #7a3d00; }
  .pill-stage-validating-t2   { background: var(--color-blue-10); color: var(--color-blue-100); }
  .pill-stage-published       { background: #cce2d8; color: #005a30; }
  .pill-stage-needs-rework    { background: #fcd6b8; color: #7a3d00; }
  .pill-risk-low    { background: #cce2d8; color: #005a30; }
  .pill-risk-medium { background: #fcd6b8; color: #7a3d00; }
  .pill-risk-high   { background: #f6d7d2; color: #942514; }
  .pill-risk-na     { background: #eeefef; color: #383f43; }

  .proto-table { width: 100%; border-collapse: collapse; }
  .proto-table th {
    text-align: left; padding: var(--spacing-xs);
    border-bottom: 2px solid var(--color-blue-100); font-size: 0.875rem;
  }
  .proto-table td {
    padding: var(--spacing-xs);
    border-bottom: 1px solid var(--color-grey-30, #b1b4b6);
    font-size: 0.9375rem; vertical-align: top;
  }
  .proto-table tr:hover td { background: var(--color-blue-10); cursor: pointer; }

  .proto-checklist { display: flex; flex-direction: column; }
  .proto-checklist__item {
    display: flex; gap: var(--spacing-xs); align-items: flex-start;
    padding: var(--spacing-xs) 0;
    border-bottom: 1px solid var(--color-grey-30, #b1b4b6);
  }
  .proto-checklist__item:last-child { border-bottom: 0; }
  .proto-check-pass   { color: #005a30; font-weight: 700; min-width: 1.5rem; }
  .proto-check-fail   { color: #942514; font-weight: 700; min-width: 1.5rem; }
  .proto-check-manual { color: #7a3d00; font-weight: 700; min-width: 1.5rem; }

  .proto-history {
    border-left: 4px solid var(--color-blue-10);
    padding-left: var(--spacing-s);
    display: flex; flex-direction: column; gap: var(--spacing-s);
  }
  .proto-history__title { font-weight: 700; }
  .proto-history__meta { font-size: 0.875rem; color: var(--color-mid-grey-00); }
  .proto-history__note { font-size: 0.9375rem; margin-top: 4px; }

  .proto-callout {
    padding: var(--spacing-s);
    border-left: 8px solid var(--color-blue-100);
    background: var(--color-blue-10);
  }
  .proto-callout--warning { border-left-color: #f47738; background: #fcd6b8; }
  .proto-callout--error   { border-left-color: #d4351c; background: #f6d7d2; }
  .proto-callout--success { border-left-color: #00703c; background: #cce2d8; }
  .proto-callout p { margin: 0; }
  .proto-callout p + p { margin-top: var(--spacing-xs); }

  .proto-field-block {
    padding: var(--spacing-s);
    border-left: 4px solid var(--color-blue-100);
    background: #fafaf9;
    margin-bottom: var(--spacing-s);
  }
  .proto-field-block.start    { border-left-color: #00703c; }
  .proto-field-block.guidance { border-left-color: #f47738; }
  .proto-field-block.shape    { border-left-color: #4c2c92; }
  .proto-field-block__dest {
    font-size: 0.75rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.05em; color: var(--color-mid-grey-00);
    margin-bottom: var(--spacing-xs);
  }

  .proto-preview {
    border: 1px solid var(--color-grey-30, #b1b4b6);
    margin-bottom: var(--spacing-s);
  }
  .proto-preview__bar {
    background: var(--color-blue-10);
    padding: var(--spacing-xs) var(--spacing-s);
    font-size: 0.875rem;
    color: var(--color-blue-100);
    font-weight: 600;
    border-bottom: 1px solid var(--color-grey-30, #b1b4b6);
    display: flex; gap: var(--spacing-xs); align-items: center;
  }

  .proto-tag {
    display: inline-block; padding: 2px 8px;
    font-size: 0.75rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .tag-entry    { background: var(--color-blue-10); color: var(--color-blue-100); }
  .tag-start    { background: #cce2d8; color: #005a30; }
  .tag-guidance { background: #fcd6b8; color: #7a3d00; }
  .tag-shape    { background: #dbd5e9; color: #2d1a59; }
  .tag-tier1    { background: #fcd6b8; color: #7a3d00; }
  .tag-tier2    { background: var(--color-blue-10); color: var(--color-blue-100); }
  .tag-rework   { background: var(--color-yellow-40, #fff7bf); color: #594d00; }

  .sla-overdue { color: #d4351c; font-weight: 700; }
  .sla-warn    { color: #f47738; font-weight: 700; }
  .sla-ok      { color: var(--color-mid-grey-00); }

  .proto-actions {
    display: flex; gap: var(--spacing-xs);
    flex-wrap: wrap; padding-top: var(--spacing-s);
  }

  /* Service preview wrapper (renders the live page in miniature) */
  .preview-frame {
    background: #fff;
    padding: var(--spacing-m);
    border: 1px dashed var(--color-grey-30, #b1b4b6);
  }
  .preview-frame .govbb-text-display { font-size: 1.75rem; }

  /* Form-page tweaks for the discovery form */
  .form-page__heading {
    display: flex; flex-direction: column; gap: var(--spacing-s);
    margin-bottom: var(--spacing-m);
  }
  .form-page__service-title {
    display: inline-flex; align-items: center;
    padding: var(--spacing-xs) var(--spacing-s);
    border-left: var(--spacing-xxs, 4px) solid var(--color-blue-40, #5a9fd4);
    color: var(--color-mid-grey-00);
    align-self: flex-start;
  }
  fieldset.proto-fieldset {
    border: 1px solid var(--color-grey-30, #b1b4b6);
    padding: var(--spacing-s);
    margin-bottom: var(--spacing-s);
  }
  fieldset.proto-fieldset > legend {
    padding: 0 var(--spacing-xs); font-weight: 700;
  }

  /* Subtle on-hover cursor for clickable rows */
  [data-clickable] { cursor: pointer; }
</style>
</head>

<div>
  <div class="govbb-official-banner">
    <div class="govbb-container govbb-official-banner__inner">
      <div class="govbb-official-banner__crest">
        <svg class="govbb-official-banner__icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Coat of arms"><rect width="64" height="64" fill="#00267f"/><path d="M32 8 L12 14 V34 C12 46 22 56 32 60 C42 56 52 46 52 34 V14 Z" fill="#ffc726" stroke="#fff" stroke-width="1"/><path d="M32 20 L24 30 L32 40 L40 30 Z" fill="#00267f"/></svg>
      </div>
      <div class="govbb-official-banner__text">
        <span>Official government website</span>
      </div>
    </div>

// =========================================================================
// HELPERS
// =========================================================================
function fmtDate(s) { if (!s) return '—'; return new Date(s).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' }); }
function fmtDateTime(s) { if (!s) return '—'; const d = new Date(s); return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' }) + ' ' + d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' }); }
function daysUntil(s) { if (!s) return null; return Math.ceil((new Date(s) - TODAY) / 86400000); }
function escapeHtml(s) { if (s == null) return ''; return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }
function getMda(code) { return state.mdas.find(m => m.code === code); }
function uid() { return 's' + Math.random().toString(36).slice(2, 9); }
function slugify(s) { return (s||'').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g,''); }
function slaClass(due) { const d = daysUntil(due); if (d == null) return ''; if (d < 0) return 'sla-overdue'; if (d <= 1) return 'sla-warn'; return 'sla-ok'; }

  for (const [k, label] of [['serviceName','Service name'],['whatService','What is this service for?'],['whoFor','Who is this service for?'],['serviceMode','Service mode'],['whatToHave','What to have ready'],['whatHappensAfter','What happens after submit']]) {
    const v = (s[k]||'').trim(); if (!v || v.length < 3) reasons.push('Field "'+label+'" is empty or too short');

  if (s.serviceMode === 'Unknown') reasons.push('Service mode must be Online, In person, or Partly online');
  const blob = ((s.serviceName||'') + ' ' + (s.whatService||'') + ' ' + (s.whatItMeans||'')).toLowerCase();
  for (const p of ['marshmellow','marshmallow','great again','lorem ipsum','test test','asdf','demo']) if (blob.includes(p)) reasons.push('Service description contains noise pattern: "'+p+'"');

  if (/eligib|means-test|pensioner|age|income/.test(blob)) { score += 2; reasons.push('Has eligibility or means-testing rules'); }
  if (/deadline|by .* (each|year)|cut[- ]off|late.*(fee|penalty)/.test(blob)) { score += 2; reasons.push('Hard deadline with consequence'); }
  if (s.alphaPaths && /yes|paths/i.test(s.alphaPaths)) { score += 1; reasons.push('Multiple paths through the service'); }
  if (s.commonConfusion && s.commonConfusion.length > 20) { score += 1; reasons.push('Has documented common-confusion areas'); }
  if (s.specialCases && s.specialCases.toLowerCase() !== 'none' && s.specialCases.length > 5) { score += 1; reasons.push('Has special cases or exceptions'); }

                  || (s.unusual && s.unusual.length > 5 && !['none','nothing'].includes((s.unusual||'').toLowerCase()));
  const isComplex = (s.alphaShape && /paths/i.test(s.alphaShape)) || (s.alphaDropOff && s.alphaDropOff.toLowerCase() !== 'none');

  }
  drafts.start = {
    title: s.serviceName,

    whoFor: model.startsWith('combined') ? s.whoFor : null,

        s.specialCases && s.specialCases.toLowerCase() !== 'none' ? { heading: 'Special cases and exceptions', body: s.specialCases } : null,

    { label: 'Service mode explicit (online / in person / partly online)', auto: true, pass: ['Online','In person','Partly online'].includes(s.serviceMode), detail: 'Detected: ' + s.serviceMode },
    { label: 'Next step uses a verb users recognise', auto: true, pass: /^(apply|start|register|book|claim|request|submit|get|pay)/i.test(drafts.start.cta.label), detail: 'CTA: "' + drafts.start.cta.label + '"' },
    { label: 'No CTA duplication (only one start-style CTA before form)', auto: true, pass: !drafts.entry || (drafts.entry.cta.label.toLowerCase() !== drafts.start.cta.label.toLowerCase()), detail: drafts.entry ? 'Entry: "' + drafts.entry.cta.label + '", Start: "' + drafts.start.cta.label + '"' : 'Combined page — only one CTA' },
    { label: 'Start = essentials only; detail is in Guidance', auto: true, pass: !drafts.guidance ? true : (drafts.start.whatYouNeed.length <= 6 && (s.beforeStart||'').length < 200), detail: drafts.guidance ? 'Start has ' + drafts.start.whatYouNeed.length + ' bullets' : 'No Guidance page needed' },
    { label: '"Who it\'s for" surfaced or signposted early', auto: true, pass: (s.whoFor||'').length > 10, detail: 'Pulled from "Who is this service for?"' },
    { label: 'Uses gov.bb design-system component vocabulary', auto: true, pass: true, detail: 'Generator emits govbb-* component classes' },
    { label: 'Headings & bullets — no buried key points', auto: false, detail: 'T1 reviewer judgement' },

function handleSubmit(e) {
  e.preventDefault();
  const fd = new FormData(e.target);
  const s = { id: uid(), submittedAt: new Date().toISOString(), history: [] };
  for (const [k, v] of fd.entries()) s[k] = v;
  s.mdaContact = getMda(s.mdaCode)?.validator || '';
  s.history.push({ at: s.submittedAt, who: s.submittedBy || 'Anonymous', action: 'Submitted', note: '' });
  const triage = runTriage(s);
  if (!triage.passed) {
    s.stage = 'rejected-triage'; s.triageReasons = triage.reasons; s.risk = 'n/a';
    s.history.push({ at: new Date().toISOString(), who: 'System', action: 'Triage failed', note: triage.reasons.length + ' issues' });
  } else {
    const risk = scoreRisk(s);
    s.risk = risk.level; s.riskReasons = risk.reasons;
    s.pageModel = decidePageModel(s);
    s.stage = 'validating-t1';
    s.slaDue = new Date(Date.now() + 5*86400000).toISOString();
    s.history.push({ at: new Date().toISOString(), who: 'System', action: 'Triage passed', note: 'All required fields present' });
    s.history.push({ at: new Date().toISOString(), who: 'AI Generator', action: 'Drafts produced', note: 'Page model: ' + s.pageModel + ', Risk: ' + risk.level });
    s.history.push({ at: new Date().toISOString(), who: 'System', action: 'Sent to T1 review', note: 'Auto-routed to GovTech content team. 5-day SLA.' });
  }
  state.services.push(s);
  saveState();
  nav('service', { id: s.id });
}

function advanceStage(id, newStage, who, note) {
  const s = state.services.find(x => x.id === id);
  if (!s) return;
  s.stage = newStage;
  if (newStage === 'published') {
    s.publishedAt = new Date().toISOString();
    s.publishedUrl = 'https://alpha.gov.bb/' + slugify(s.serviceName);
    s.nextReview = new Date(Date.now() + 180*86400000).toISOString();
  }
  if (['validating-t1','validating-t2'].includes(newStage)) {
    s.slaDue = new Date(Date.now() + 5*86400000).toISOString();
  }
  s.history.push({ at: new Date().toISOString(), who, action: STAGES[newStage].label, note });
  saveState();
  render();
}

// =========================================================================
// REVIEW UI — rework feedback panel, inline editing, MDA registration
// =========================================================================
let ui = { reworkFor: null, editingFor: null, addingMda: false };

function showRework(id, role) { ui.reworkFor = { id, role }; render(); }
function cancelRework() { ui.reworkFor = null; render(); }
function submitRework() {
  if (!ui.reworkFor) return;
  const ta = document.getElementById('rework-text');
  const text = ((ta && ta.value) || '').trim();
  if (!text) { alert('Please describe what needs to change before this can be approved.'); return; }
  const r = ui.reworkFor;
  ui.reworkFor = null;
  advanceStage(r.id, 'needs-rework', r.role, text);
}

function toggleEdit(id) { ui.editingFor = ui.editingFor === id ? null : id; render(); }
function saveEdit(id) {
  const s = state.services.find(x => x.id === id);
  if (!s) return;
  ['whatService','whoFor','beforeStart','whatToHave','costsDeadlines','whatItMeans','whatHappensAfter','commonConfusion','specialCases','unusual'].forEach(f => {
    const el = document.getElementById('edit-' + f);
    if (el) s[f] = el.value;
  });
  const risk = scoreRisk(s);
  s.risk = risk.level; s.riskReasons = risk.reasons;
  s.pageModel = decidePageModel(s);
  s.history.push({ at: new Date().toISOString(), who: 'Reviewer', action: 'Edited drafts', note: 'Inline edits saved during review' });
  ui.editingFor = null;
  saveState();
  render();
}

function showAddMda() { ui.addingMda = true; render(); }
function cancelAddMda() { ui.addingMda = false; render(); }
function submitAddMda() {
  const code = (document.getElementById('new-mda-code').value || '').trim().toUpperCase();
  const name = (document.getElementById('new-mda-name').value || '').trim();
  const website = (document.getElementById('new-mda-website')?.value || '').trim();
  const validator = (document.getElementById('new-mda-validator').value || '').trim();
  const email = (document.getElementById('new-mda-email').value || '').trim();
  const backup = (document.getElementById('new-mda-backup').value || '').trim();
  const backupEmail = (document.getElementById('new-mda-backup-email').value || '').trim();
  if (!code || !name) { alert('MDA code and name are required.'); return; }
  if (state.mdas.find(m => m.code === code)) { alert('That code is already in use.'); return; }
  state.mdas.push({ code, name, website, validator, email, backup, backupEmail });
  ui.addingMda = false;
  // Auto-select the new MDA if we are on the upload page
  saveState();
  render();
  const sel = document.getElementById('upload-mda');
  if (sel) sel.value = code;
}

// =========================================================================
// FORM UPLOAD — actual parsing of PDF, DOCX, image, HTML, URL
// =========================================================================
let uploadStatus = '';

function loadScript(src) {
  return new Promise((resolve, reject) => {
    if (document.querySelector('script[data-loaded-src="' + src + '"]')) return resolve();
    const sc = document.createElement('script');
    sc.src = src;
    sc.dataset.loadedSrc = src;
    sc.onload = () => resolve();
    sc.onerror = () => reject(new Error('Failed to load ' + src));
    document.head.appendChild(sc);
  });
}
async function loadPdfJs() {
  if (window.pdfjsLib) return window.pdfjsLib;
  await loadScript('https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js');
  window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  return window.pdfjsLib;
}
async function loadMammoth() {
  if (window.mammoth) return window.mammoth;
  await loadScript('https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js');
  return window.mammoth;
}
async function loadTesseract() {
  if (window.Tesseract) return window.Tesseract;
  await loadScript('https://unpkg.com/tesseract.js@5/dist/tesseract.min.js');
  return window.Tesseract;
}

async function parsePdf(file) {
  const lib = await loadPdfJs();
  const arrayBuffer = await file.arrayBuffer();
  const pdf = await lib.getDocument({ data: arrayBuffer }).promise;
  let text = '';
  for (let i = 1; i <= pdf.numPages; i++) {
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    text += content.items.map(it => it.str).join(' ') + '\n';
  }
  return text;
}
async function parseDocx(file) {
  const m = await loadMammoth();
  const arrayBuffer = await file.arrayBuffer();
  const result = await m.extractRawText({ arrayBuffer });
  return result.value;
}
async function parseImage(file, onProgress) {
  const T = await loadTesseract();
  const result = await T.recognize(file, 'eng', { logger: msg => onProgress && onProgress(msg) });
  return result.data.text;
}
async function parseHtmlFile(file) {
  const text = await file.text();
  const tmp = document.createElement('div'); tmp.innerHTML = text;
  return tmp.textContent.replace(/\s+/g, ' ').trim();
}
async function fetchFormUrl(url) {
  const res = await fetch(url, { mode: 'cors' });
  if (!res.ok) throw new Error('HTTP ' + res.status);
  const text = await res.text();
  const tmp = document.createElement('div'); tmp.innerHTML = text;
  return tmp.textContent.replace(/\s+/g, ' ').trim();
}

async function fetchFormUrlWithMeta(url) {
  const res = await fetch(url, { mode: 'cors' });
  if (!res.ok) throw new Error('HTTP ' + res.status);
  const html = await res.text();
  let title = '';
  let text = '';
  try {
    const parser = new DOMParser();
    const doc = parser.parseFromString(html, 'text/html');
    title = (doc.querySelector('h1')?.textContent || doc.title || '').trim().replace(/\s+/g, ' ');
    text = (doc.body?.textContent || '').replace(/\s+/g, ' ').trim();
  } catch (e) {
    const tmp = document.createElement('div'); tmp.innerHTML = html;
    text = tmp.textContent.replace(/\s+/g, ' ').trim();
  }
  return { text, title, html };
}

function inferServiceName(formMeta, urlString) {
  if (formMeta.title && formMeta.title.length > 3 && formMeta.title.length < 120) {
    return formMeta.title;
  }
  try {
    const u = new URL(urlString);
    const segments = u.pathname.split('/').filter(Boolean);
    const lastSeg = segments[segments.length - 1] || segments[0] || 'service';
    return lastSeg.replace(/\.[a-z]+$/i, '').replace(/[-_]/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
  } catch (e) {
    return 'Service from ' + urlString.slice(0, 60);
  }
}

function inferServiceMode(text) {
  const lower = text.toLowerCase();
  const inPersonHints = /visit our office|visit the office|come in person|attend in person|attend a polyclinic|appointment at our|pick up in person|collect (?:at|in person)|in person at|at the (?:department|office|polyclinic)/;
  const onlineHints = /submit online|fill out online|complete online|apply online|online application|electronic submission|web form|this online form/;
  const hasInPerson = inPersonHints.test(lower);
  const hasOnline = onlineHints.test(lower);
  if (hasInPerson && hasOnline) return 'Partly online';
  if (hasInPerson) return 'In person';
  return 'Online';
}

function extractFieldsFromText(rawText, hints) {
  const text = rawText.replace(/\s+/g, ' ').trim();
  const sentences = text.split(/(?<=[.!?])\s/).filter(s => s.length > 10);
  const findSentence = (re, fallback) => { const m = sentences.find(s => re.test(s)); return m ? m.trim() : fallback; };
  const findBlock = (re, fallback) => { const m = text.match(re); return m ? (m[1]||m[0]).trim() : fallback; };

  const whatService = findSentence(
    /apply for|application for|use this form|claim|register for|request|submit/i,
    hints.serviceName + ' application. Use this form to apply for ' + hints.serviceName.toLowerCase() + '.'
  ).slice(0, 350);

  const whoFor = findSentence(
    /eligibility|eligible|who can apply|applicants must|you (?:must|need to) be|residents|citizens|aged/i,
    hints.serviceName + ' applicants in Barbados.'
  ).slice(0, 350);

  const bulletRe = /(?:[•●\-\*]|\n\s*\d+[.)]|\n\s*[a-z][.)])\s*([A-Z][^\n]{4,80})/g;
  const bullets = [];
  let bm;
  while ((bm = bulletRe.exec(rawText)) && bullets.length < 8) {
    const item = bm[1].trim().replace(/[.,;]+$/, '');
    if (item && !bullets.includes(item)) bullets.push(item);
  }
  let whatToHave;
  if (bullets.length >= 2) {
    whatToHave = bullets.slice(0, 6).join(', ');
  } else {
    whatToHave = findBlock(
      /(?:documents required|you must provide|please bring|required documents|attach|supporting documents)[:\s]*([^.]{20,400})/i,
      'Identification document, supporting evidence relevant to your application'
    );
  }

  const costsDeadlines = findSentence(
    /\b(?:fee|cost|charge|deadline|due date|by\s+\d|within\s+\d+\s+(?:days|weeks|months)|late|expir)/i,
    'Check the form for any applicable fees or deadlines.'
  ).slice(0, 250);

  const whatHappensAfter = findSentence(
    /after submitting|once submitted|you will receive|next steps|processing time|confirmation|approved|decision/i,
    'You will receive a confirmation. Your application will be processed by the issuing department.'
  ).slice(0, 300);

  const whatItMeans = 'Complete and submit this form ' +
    (hints.serviceMode === 'Online' ? 'online' :
     hints.serviceMode === 'Partly online' ? 'online and complete remaining steps in person' :
     'in person at the issuing department') + '.';

  const specialCases = findBlock(/(?:exception|special case|unless|except|if you (?:are|have))[^.]{20,300}\./i, '');
  const unusual = findBlock(/(?:please note|important[: ]|note that|warning|caution)[^.]{20,300}\./i, '');

  return {
    serviceName: hints.serviceName, mdaCode: hints.mdaCode, serviceMode: hints.serviceMode,
    whatService, whoFor, beforeStart: '',
    whatToHave, costsDeadlines, whatItMeans, whatHappensAfter,
    commonConfusion: '', specialCases, unusual,
    alphaPaths: 'no', alphaShape: 'Simple', alphaDropOff: 'none'
  };
}

function setUploadStatus(html) {
  uploadStatus = html;
  const el = document.getElementById('upload-status');
  if (el) el.innerHTML = html;
}

async function handleUploadGenerate() {
  const mdaCode = document.getElementById('upload-mda').value;
  const submittedBy = (document.getElementById('upload-by').value || '').trim() || 'Adunni';
  const url = (document.getElementById('upload-url').value || '').trim();

  if (!mdaCode) {
    setUploadStatus('<div class="proto-callout proto-callout--error"><p><strong>MDA required.</strong> Select an MDA from the list, or add a new one.</p></div>');
    return;
  }
  if (!url) {
    setUploadStatus('<div class="proto-callout proto-callout--error"><p><strong>Form URL required.</strong></p></div>');
    return;
  }

  try {
    setUploadStatus('<p>Fetching form from URL…</p>');
    let formData;
    try {
      formData = await fetchFormUrlWithMeta(url);
    } catch (e) {
      throw new Error('Could not fetch the form URL. The host may not allow cross-origin requests. (Try a GitHub Pages-hosted prototype form.)');
    }

    if (!formData.text || formData.text.length < 50) {
      throw new Error('The page at that URL did not contain enough text to analyse. It may be a blank page, an image, or a JavaScript-rendered form that requires a server-side fetch.');
    }

    const mda = getMda(mdaCode);
    let mdaContext = '';
    if (mda?.website) {
      setUploadStatus('<p>Consulting ' + escapeHtml(mda.name) + ' website (' + escapeHtml(mda.website) + ')…</p>');
      try {
        const mdaData = await fetchFormUrlWithMeta(mda.website);
        mdaContext = mdaData.text.slice(0, 4000);
      } catch (e) {
        // MDA site fetch failed (CORS or 404) — we proceed without it.
      }
    }

    setUploadStatus('<p>Inferring service name and mode…</p>');
    const inferredName = inferServiceName(formData, url);
    const combinedText = formData.text + (mdaContext ? '\n\n[MDA context from ' + mda.website + ']\n' + mdaContext : '');
    const inferredMode = inferServiceMode(combinedText);

    setUploadStatus('<p>Generating Entry / Start / Guidance drafts…</p>');
    const fields = extractFieldsFromText(combinedText, {
      serviceName: inferredName,
      mdaCode,
      serviceMode: inferredMode
    });

    const s = Object.assign({
      id: uid(),
      submittedAt: new Date().toISOString(),
      submittedBy,
      formUrl: url,
      mdaContact: mda?.validator || '',
      sourceFile: url,
      sourceText: formData.text.slice(0, 1500),
      history: [
        { at: new Date().toISOString(), who: submittedBy, action: 'Submitted form URL', note: 'URL: ' + url + ' · MDA: ' + (mda?.name || mdaCode) }
      ]
    }, fields);

    const triage = runTriage(s);
    if (!triage.passed) {
      s.stage = 'rejected-triage'; s.triageReasons = triage.reasons; s.risk = 'n/a';
      s.history.push({ at: new Date().toISOString(), who: 'System', action: 'Triage failed', note: triage.reasons.length + ' issues' });
    } else {
      const risk = scoreRisk(s);
      s.risk = risk.level; s.riskReasons = risk.reasons;
      s.pageModel = decidePageModel(s);
      s.stage = 'validating-t1';
      s.slaDue = new Date(Date.now() + 5*86400000).toISOString();
      s.history.push({ at: new Date().toISOString(), who: 'AI', action: 'Inferred service details', note: 'Service name: "' + inferredName + '" · Mode: ' + inferredMode + (mdaContext ? ' · MDA website: consulted' : ' · MDA website: not reachable') });
      s.history.push({ at: new Date().toISOString(), who: 'System', action: 'Triage passed', note: 'All required fields present' });
      s.history.push({ at: new Date().toISOString(), who: 'AI Generator', action: 'Drafts produced from form', note: 'Page model: ' + s.pageModel + ', Risk: ' + risk.level });
      s.history.push({ at: new Date().toISOString(), who: 'System', action: 'Sent to T1 review', note: 'Auto-routed to GovTech content team. 5-day SLA.' });
    }

    state.services.push(s);
    saveState();
    uploadStatus = '';
    nav('service', { id: s.id });
  } catch (err) {
    setUploadStatus('<div class="proto-callout proto-callout--error"><p><strong>Could not process the form.</strong> ' + escapeHtml(err.message) + '</p></div>');
  }
}
